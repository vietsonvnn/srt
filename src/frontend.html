<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRT Fixer — Sửa phụ đề CapCut bằng AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --primary:#6366f1;
    --primary-hover:#4f46e5;
    --primary-light:#eef2ff;
    --success:#10b981;
    --success-light:#ecfdf5;
    --error:#ef4444;
    --error-light:#fef2f2;
    --gray-50:#f9fafb;
    --gray-100:#f3f4f6;
    --gray-200:#e5e7eb;
    --gray-300:#d1d5db;
    --gray-400:#9ca3af;
    --gray-500:#6b7280;
    --gray-600:#4b5563;
    --gray-700:#374151;
    --gray-800:#1f2937;
    --gray-900:#111827;
    --radius:12px;
    --radius-sm:8px;
    --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
    --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
    --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
    --transition:all .2s ease;
  }

  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    background:var(--gray-50);
    color:var(--gray-800);
    line-height:1.6;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ── Header ── */
  .header{
    background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#a78bfa 100%);
    color:#fff;
    text-align:center;
    padding:2.8rem 1rem 2.2rem;
    position:relative;
    overflow:hidden;
  }
  .header::before{
    content:'';
    position:absolute;
    top:-40%;left:-10%;
    width:120%;height:180%;
    background:repeating-linear-gradient(
      90deg,
      transparent,
      transparent 48px,
      rgba(255,255,255,.03) 48px,
      rgba(255,255,255,.03) 52px
    );
    pointer-events:none;
  }
  .header::after{
    content:'';
    position:absolute;
    bottom:0;left:0;right:0;
    height:4px;
    background:linear-gradient(90deg,#6366f1,#a78bfa,#c4b5fd,#a78bfa,#6366f1);
    background-size:200% 100%;
    animation:headerShine 3s ease infinite;
  }
  @keyframes headerShine{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }
  .header-icon{
    display:inline-block;
    margin-bottom:.5rem;
    opacity:.9;
  }
  .header h1{font-size:2.2rem;font-weight:800;letter-spacing:-.02em;position:relative}
  .header p{opacity:.88;margin-top:.4rem;font-size:1.08rem;font-weight:400;position:relative}

  /* ── Container ── */
  .container{
    max-width:860px;
    width:100%;
    margin:0 auto;
    padding:1.5rem 1rem 3rem;
    flex:1;
  }

  /* ── Card ── */
  .card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:1.5rem;
    margin-bottom:1.25rem;
    transition:var(--transition);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,var(--primary),#a78bfa);
    opacity:0;
    transition:opacity .3s ease;
  }
  .card:hover{box-shadow:var(--shadow-md)}
  .card:hover::before{opacity:1}

  /* ── File pair ── */
  .pair-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1rem;
  }
  .pair-number{
    font-weight:600;
    font-size:.95rem;
    color:var(--primary);
    background:var(--primary-light);
    padding:.25rem .75rem;
    border-radius:20px;
  }
  .pair-hint{
    font-size:.75rem;
    color:var(--gray-400);
    font-style:italic;
    flex:1;
    text-align:center;
  }
  .btn-remove{
    background:none;
    border:none;
    color:var(--gray-400);
    cursor:pointer;
    font-size:1.2rem;
    padding:.25rem .5rem;
    border-radius:var(--radius-sm);
    transition:var(--transition);
  }
  .btn-remove:hover{color:var(--error);background:var(--error-light)}

  .file-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1rem;
  }
  @media(max-width:600px){
    .file-row{grid-template-columns:1fr}
  }

  .file-group label{
    display:block;
    font-size:.85rem;
    font-weight:600;
    color:var(--gray-600);
    margin-bottom:.4rem;
  }

  .file-input-wrapper{
    position:relative;
    border:2px dashed var(--gray-200);
    border-radius:var(--radius-sm);
    padding:1rem;
    text-align:center;
    cursor:pointer;
    transition:var(--transition);
    min-height:80px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:.3rem;
    background:linear-gradient(135deg,rgba(99,102,241,.02) 0%,rgba(167,139,250,.04) 100%);
  }
  .file-input-wrapper:hover,.file-input-wrapper.dragover{
    border-color:var(--primary);
    background:var(--primary-light);
  }
  .file-input-wrapper.has-file{
    border-color:var(--success);
    background:var(--success-light);
    border-style:solid;
  }
  .file-input-wrapper input[type="file"]{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
  }
  .file-input-icon{font-size:1.5rem;line-height:1}
  .file-input-label{font-size:.85rem;color:var(--gray-500)}
  .file-input-name{font-size:.8rem;color:var(--success);font-weight:600;word-break:break-all}

  /* ── Buttons ── */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    border:none;
    border-radius:var(--radius-sm);
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
    padding:.6rem 1.2rem;
    transition:var(--transition);
  }
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .btn-primary{
    background:var(--primary);
    color:#fff;
  }
  .btn-primary:hover:not(:disabled){background:var(--primary-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .btn-primary:active:not(:disabled){transform:translateY(0)}

  .btn-outline{
    background:#fff;
    color:var(--gray-600);
    border:1.5px solid var(--gray-200);
  }
  .btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

  .btn-success{background:var(--success);color:#fff}
  .btn-success:hover:not(:disabled){background:#059669;transform:translateY(-1px);box-shadow:var(--shadow-md)}

  .btn-sm{padding:.4rem .8rem;font-size:.8rem}
  .btn-lg{padding:.85rem 2rem;font-size:1.05rem}

  .actions-row{
    display:flex;
    flex-wrap:wrap;
    gap:.75rem;
    margin-top:.5rem;
    margin-bottom:1.5rem;
  }

  .process-section{text-align:center;margin:1.5rem 0}

  /* ── Shimmer button ── */
  .btn-process-main{
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,var(--primary) 0%,#7c3aed 100%);
  }
  .btn-process-main::after{
    content:'';
    position:absolute;
    top:0;left:-100%;
    width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
    animation:btnShimmer 2.5s ease-in-out infinite;
  }
  .btn-process-main:disabled::after{animation:none}
  @keyframes btnShimmer{
    0%{left:-100%}
    50%{left:100%}
    100%{left:100%}
  }
  .btn-process-main:hover:not(:disabled){
    background:linear-gradient(135deg,var(--primary-hover) 0%,#6d28d9 100%);
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(99,102,241,.35);
  }

  /* ── Progress ── */
  .progress-text{
    margin-top:.75rem;
    font-size:.9rem;
    color:var(--gray-500);
    display:none;
  }

  .progress-bar-wrapper{
    width:100%;
    max-width:360px;
    margin:.75rem auto 0;
    height:6px;
    background:var(--gray-200);
    border-radius:3px;
    overflow:hidden;
    display:none;
  }
  .progress-bar-wrapper.visible{display:block}
  .progress-bar-inner{
    height:100%;
    width:30%;
    background:linear-gradient(90deg,var(--primary),#a78bfa);
    border-radius:3px;
    animation:progressPulse 1.8s ease-in-out infinite;
  }
  @keyframes progressPulse{
    0%{width:15%;margin-left:0}
    50%{width:40%;margin-left:30%}
    100%{width:15%;margin-left:85%}
  }

  .progress-hint{
    margin-top:.4rem;
    font-size:.82rem;
    color:var(--gray-400);
    display:none;
  }
  .progress-hint.visible{display:block}

  /* ── Spinner ── */
  .spinner{
    display:inline-block;
    width:18px;height:18px;
    border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Results ── */
  #results-area{display:none}
  #results-area.visible{display:block;animation:fadeIn .4s ease}

  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .results-heading{
    font-size:1.15rem;
    font-weight:700;
    margin-bottom:1rem;
    color:var(--gray-700);
    display:flex;
    align-items:center;
    gap:.5rem;
  }

  .result-card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:1rem;
    animation:slideIn .35s ease both;
  }
  .result-card:nth-child(2){animation-delay:.08s}
  .result-card:nth-child(3){animation-delay:.16s}

  .result-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1rem 1.25rem;
    border-bottom:1px solid var(--gray-100);
    flex-wrap:wrap;
    gap:.5rem;
  }
  .result-filename{font-weight:600;font-size:.95rem;word-break:break-all}

  .result-stats{
    display:flex;
    gap:.75rem;
    flex-wrap:wrap;
  }
  .stat-badge{
    font-size:.8rem;
    font-weight:600;
    padding:.3rem .75rem;
    border-radius:20px;
    display:inline-flex;
    align-items:center;
    gap:.3rem;
  }
  .stat-errors{background:var(--error-light);color:var(--error)}
  .stat-fixed{background:var(--success-light);color:var(--success)}
  .stat-clean{background:var(--primary-light);color:var(--primary)}

  .result-actions{
    display:flex;
    align-items:center;
    gap:.5rem;
    padding:.75rem 1.25rem;
    border-top:1px solid var(--gray-100);
  }

  /* ── Diff ── */
  .diff-toggle{
    background:none;
    border:none;
    color:var(--primary);
    cursor:pointer;
    font-size:.85rem;
    font-weight:600;
    padding:.3rem .6rem;
    border-radius:var(--radius-sm);
    transition:var(--transition);
  }
  .diff-toggle:hover{background:var(--primary-light)}

  .diff-container{
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease;
  }
  .diff-container.open{max-height:5000px}

  .diff-table{
    width:100%;
    border-collapse:collapse;
    font-size:.82rem;
    font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
  }
  .diff-table th{
    padding:.5rem .75rem;
    text-align:left;
    font-size:.75rem;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--gray-500);
    background:var(--gray-50);
    border-bottom:1px solid var(--gray-200);
    position:sticky;
    top:0;
  }
  .diff-table td{
    padding:.45rem .75rem;
    vertical-align:top;
    border-bottom:1px solid var(--gray-100);
    white-space:pre-wrap;
    word-break:break-word;
  }
  .diff-index{
    color:var(--gray-400);
    width:40px;
    text-align:center;
    font-size:.75rem;
  }
  .diff-row-changed td{background:#fffbeb}
  .diff-original{color:var(--error)}
  .diff-fixed{color:var(--success)}

  .diff-scroll{
    max-height:400px;
    overflow-y:auto;
    border-top:1px solid var(--gray-100);
  }

  /* ── Download All ── */
  .download-all-section{
    text-align:center;
    margin-top:1.5rem;
    padding-top:1rem;
  }

  /* ── Empty State ── */
  .empty-state{
    text-align:center;
    padding:3rem 1rem;
    color:var(--gray-400);
  }
  .empty-state-icon{
    margin-bottom:.75rem;
    opacity:.5;
  }
  .empty-state-text{
    font-size:.95rem;
    font-weight:500;
  }
  .empty-state-sub{
    font-size:.85rem;
    margin-top:.3rem;
    color:var(--gray-300);
  }

  /* ── Toast ── */
  .toast-container{
    position:fixed;
    top:1rem;
    right:1rem;
    z-index:9999;
    display:flex;
    flex-direction:column;
    gap:.5rem;
  }
  .toast{
    padding:.75rem 1.25rem;
    border-radius:var(--radius-sm);
    font-size:.88rem;
    font-weight:500;
    box-shadow:var(--shadow-lg);
    animation:toastIn .3s ease;
    max-width:380px;
    word-break:break-word;
  }
  .toast-error{background:var(--error);color:#fff}
  .toast-success{background:var(--success);color:#fff}
  .toast-info{background:var(--gray-700);color:#fff}

  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

  /* ── Footer ── */
  .footer{
    text-align:center;
    padding:1.5rem 1rem;
    color:var(--gray-400);
    font-size:.85rem;
  }
  .footer .heart{color:#ef4444;font-size:1rem}
  .footer-brand{
    color:var(--primary);
    font-weight:700;
    letter-spacing:-.01em;
  }

  /* ── Settings Card ── */
  .settings-card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    margin-bottom:1.25rem;
    overflow:hidden;
  }
  .settings-toggle{
    display:flex;
    align-items:center;
    gap:.5rem;
    padding:.75rem 1.25rem;
    cursor:pointer;
    font-weight:600;
    font-size:.9rem;
    color:var(--gray-700);
    border:none;
    background:none;
    width:100%;
    transition:var(--transition);
  }
  .settings-toggle:hover{background:var(--gray-50)}
  .settings-toggle svg:last-child{
    margin-left:auto;
    transition:transform .2s ease;
  }
  .settings-body{
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease;
  }
  .settings-body.open{max-height:300px}
  .settings-body-inner{
    padding:0 1.25rem 1rem;
    display:flex;
    gap:.75rem;
    align-items:flex-end;
    flex-wrap:wrap;
  }
  .settings-body-inner .settings-group{flex:1;min-width:150px}
  .settings-body-inner label{
    display:block;
    font-size:.78rem;
    font-weight:600;
    color:var(--gray-500);
    margin-bottom:.25rem;
  }
  .settings-body-inner textarea,
  .settings-body-inner select{
    width:100%;
    padding:.45rem .6rem;
    border:1.5px solid var(--gray-200);
    border-radius:var(--radius-sm);
    font-size:.82rem;
    font-family:inherit;
    transition:var(--transition);
    background:#fff;
  }
  .settings-body-inner textarea:focus,
  .settings-body-inner select:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(99,102,241,.1);
  }
  .settings-body-inner textarea{resize:vertical}

  /* ── Responsive ── */
  @media(max-width:600px){
    .header{padding:1.5rem 1rem}
    .header h1{font-size:1.5rem}
    .container{padding:1rem .75rem 2rem}
    .card{padding:1.1rem}
    .settings-body-inner{flex-direction:column}
    .result-header{flex-direction:column;align-items:flex-start}
    .btn-lg{width:100%}
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<div class="container">

  <!-- Settings -->
  <div class="settings-card">

      C&#224;i &#273;&#7863;t

    </button>
    <div class="settings-body" id="settings-body">
      <div class="settings-body-inner">

            <option value="gpt-5-nano">GPT-5 Nano</option>
            <option value="gpt-5-mini">GPT-5 Mini</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="saveSettings()">L&#432;u</button>
      </div>
    </div>
  </div>

  <!-- Empty State (shown before results) -->
  <div class="empty-state" id="empty-state">
    <div class="empty-state-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </div>
    <div class="empty-state-text">Th&#234;m file ph&#7909; &#273;&#7873; v&#224; n&#7897;i dung g&#7889;c &#7903; tr&#234;n</div>
    <div class="empty-state-sub">K&#7871;t qu&#7843; s&#7917;a l&#7895;i s&#7869; hi&#7875;n th&#7883; t&#7841;i &#273;&#226;y</div>
  </div>

  <!-- Upload Section -->
  <div id="pairs-container"></div>

  <div class="actions-row">
    <button class="btn btn-outline" id="btn-add-pair" onclick="addPair()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
      Th&#234;m c&#7863;p file
    </button>
  </div>

  <!-- Process Button -->
  <div class="process-section">
    <button class="btn btn-primary btn-lg btn-process-main" id="btn-process" disabled onclick="processAll()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      S&#7917;a ph&#7909; &#273;&#7873;
    </button>
    <div class="progress-text" id="progress-text"></div>
    <div class="progress-bar-wrapper" id="progress-bar"><div class="progress-bar-inner"></div></div>
    <div class="progress-hint" id="progress-hint"></div>
  </div>

  <!-- Results Section -->
  <div id="results-area">
    <h2 class="results-heading">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      K&#7871;t qu&#7843;
    </h2>
    <div id="results-container"></div>
    <div class="download-all-section" id="download-all-section" style="display:none">
      <button class="btn btn-success btn-lg" onclick="downloadAll()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        T&#7843;i t&#7845;t c&#7843;
      </button>
    </div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  Made with <span class="heart">&#10084;&#65039;</span> by <strong class="footer-brand">jution</strong>
</div>

<script>
// ── State ──
let pairCounter = 0;
const pairs = new Map(); // id -> { srtFile, originalFile }
const results = [];      // processed results

// ── Toast ──
function showToast(message, type = 'error') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut .3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ── Pair Management ──
function addPair() {
  pairCounter++;
  const id = pairCounter;
  pairs.set(id, { srtFile: null, originalFile: null });

  const card = document.createElement('div');
  card.className = 'card';
  card.id = `pair-${id}`;
  card.style.animation = 'slideIn .3s ease';

  card.innerHTML = `
    <div class="pair-header">
      <span class="pair-number">C\u1eb7p file ${id}</span>
      <span class="pair-hint">K\u00e9o th\u1ea3 2 file c\u00f9ng l\u00fac \u0111\u1ec3 t\u1ef1 \u0111\u1ed9ng nh\u1eadn di\u1ec7n</span>
      <button class="btn-remove" title="X\u00f3a c\u1eb7p file" onclick="removePair(${id})">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="file-row">
      <div class="file-group">
        <label>File ph\u1ee5 \u0111\u1ec1 (SRT)</label>
        <div class="file-input-wrapper" id="srt-drop-${id}">
          <input type="file" accept=".srt,.txt,.docx" onchange="handleFile(${id},'srt',this)">
          <div class="file-input-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="file-input-label">K\u00e9o th\u1ea3 ho\u1eb7c nh\u1ea5n \u0111\u1ec3 ch\u1ecdn file</div>
        </div>
      </div>
      <div class="file-group">
        <label>N\u1ed9i dung g\u1ed1c</label>
        <div class="file-input-wrapper" id="orig-drop-${id}">
          <input type="file" accept=".srt,.txt,.docx" onchange="handleFile(${id},'original',this)">
          <div class="file-input-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <div class="file-input-label">K\u00e9o th\u1ea3 ho\u1eb7c nh\u1ea5n \u0111\u1ec3 ch\u1ecdn file</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('pairs-container').appendChild(card);
  updateRemoveButtons();
  updateProcessButton();
  setupDragDrop(id);
}

function removePair(id) {
  const card = document.getElementById(`pair-${id}`);
  if (!card) return;
  card.style.animation = 'fadeIn .25s ease reverse forwards';
  setTimeout(() => {
    card.remove();
    pairs.delete(id);
    renumberPairs();
    updateRemoveButtons();
    updateProcessButton();
  }, 250);
}

function renumberPairs() {
  const cards = document.querySelectorAll('#pairs-container .card');
  cards.forEach((card, i) => {
    const badge = card.querySelector('.pair-number');
    if (badge) badge.textContent = `C\u1eb7p file ${i + 1}`;
  });
}

function updateRemoveButtons() {
  const cards = document.querySelectorAll('#pairs-container .card');
  cards.forEach(card => {
    const btn = card.querySelector('.btn-remove');
    if (btn) btn.style.display = cards.length <= 1 ? 'none' : '';
  });
}

function updateProcessButton() {
  const btn = document.getElementById('btn-process');
  let hasComplete = false;
  for (const [, p] of pairs) {
    if (p.srtFile && p.originalFile) { hasComplete = true; break; }
  }
  btn.disabled = !hasComplete;
}

// ── File Handling ──
function handleFile(pairId, type, input) {
  const file = input.files[0];
  if (!file) return;

  const pair = pairs.get(pairId);
  if (!pair) return;

  // Auto-detect: override target zone based on file extension
  const detected = detectFileType(file);
  const actualType = detected || type;

  if (actualType === 'srt') {
    pair.srtFile = file;
    updateFileUI(pairId, 'srt', file.name);
  } else {
    pair.originalFile = file;
    updateFileUI(pairId, 'original', file.name);
  }
  updateProcessButton();
}

function updateFileUI(pairId, type, filename) {
  const prefix = type === 'srt' ? 'srt' : 'orig';
  const wrapper = document.getElementById(`${prefix}-drop-${pairId}`);
  if (!wrapper) return;
  wrapper.classList.add('has-file');
  const icon = wrapper.querySelector('.file-input-icon');
  const label = wrapper.querySelector('.file-input-label');
  let nameEl = wrapper.querySelector('.file-input-name');

  if (icon) icon.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  if (label) label.textContent = '\u0110\u00e3 ch\u1ecdn file';
  if (!nameEl) {
    nameEl = document.createElement('div');
    nameEl.className = 'file-input-name';
    wrapper.appendChild(nameEl);
  }
  nameEl.textContent = filename;
}

// ── Auto-detect file type ──
function detectFileType(file) {
  const name = file.name.toLowerCase();
  if (name.endsWith('.srt')) return 'srt';
  if (name.endsWith('.txt') || name.endsWith('.docx')) return 'original';
  return null;
}

function assignFileToPair(pairId, file, type) {
  const pair = pairs.get(pairId);
  if (!pair) return;
  const prefix = type === 'srt' ? 'srt' : 'orig';
  const wrapper = document.getElementById(`${prefix}-drop-${pairId}`);
  if (!wrapper) return;
  const input = wrapper.querySelector('input[type="file"]');
  const dt = new DataTransfer();
  dt.items.add(file);
  input.files = dt.files;
  input.dispatchEvent(new Event('change'));
}

// ── Drag & Drop (auto-detect khi kéo 1 hoặc 2 file) ──
function setupDragDrop(pairId) {
  const card = document.getElementById(`pair-${pairId}`);
  if (!card) return;

  // Single-zone drops still work
  ['srt', 'orig'].forEach(prefix => {
    const wrapper = document.getElementById(`${prefix}-drop-${pairId}`);
    if (!wrapper) return;
    wrapper.addEventListener('dragover', e => { e.preventDefault(); wrapper.classList.add('dragover'); });
    wrapper.addEventListener('dragleave', () => wrapper.classList.remove('dragover'));
    wrapper.addEventListener('drop', e => {
      e.preventDefault();
      wrapper.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files);
      if (files.length === 0) return;

      // Multiple files dropped on one zone → auto-detect
      if (files.length >= 2) {
        e.stopPropagation();
        autoAssignFiles(pairId, files);
        return;
      }

      // Single file: auto-detect or use target zone
      const detected = detectFileType(files[0]);
      if (detected) {
        e.stopPropagation();
        assignFileToPair(pairId, files[0], detected);
      } else {
        // Unknown type — assign to the zone it was dropped on
        const type = prefix === 'srt' ? 'srt' : 'original';
        assignFileToPair(pairId, files[0], type);
      }
    });
  });

  // Card-level drop for multi-file auto-detect
  card.addEventListener('dragover', e => { e.preventDefault(); });
  card.addEventListener('drop', e => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer.files);
    if (files.length >= 2) {
      autoAssignFiles(pairId, files);
    } else if (files.length === 1) {
      const detected = detectFileType(files[0]);
      if (detected) assignFileToPair(pairId, files[0], detected);
      else showToast(`Không nhận diện được loại file: ${files[0].name}`);
    }
  });
}

function autoAssignFiles(pairId, files) {
  let srtFile = null, origFile = null;
  for (const f of files) {
    const type = detectFileType(f);
    if (type === 'srt' && !srtFile) srtFile = f;
    else if (type === 'original' && !origFile) origFile = f;
  }
  if (srtFile) assignFileToPair(pairId, srtFile, 'srt');
  if (origFile) assignFileToPair(pairId, origFile, 'original');
  if (!srtFile && !origFile) {
    showToast('Không tìm thấy file .srt hoặc .txt/.docx');
  }
}

// ── SRT Parsing ──
function parseSRT(content) {
  // Strip UTF-8 BOM (common in CapCut exports)
  if (content.charCodeAt(0) === 0xFEFF) {
    content = content.slice(1);
  }
  const normalized = content.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const blocks = normalized.trim().split(/\n\n+/);
  const entries = [];

  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;

    const indexLine = lines[0].trim();
    const index = parseInt(indexLine, 10);
    if (isNaN(index)) continue;

    const timeCode = lines[1].trim();
    if (!timeCode.includes('-->')) continue;

    const text = lines.slice(2).join('\n');
    entries.push({ index, timeCode, text });
  }
  return entries;
}

function buildSRT(entries) {
  return entries.map(e =>
    `${e.index}\n${e.timeCode}\n${e.text}`
  ).join('\n\n') + '\n';
}

// ── DOCX / TXT Extraction ──
async function extractText(file) {
  if (file.name.toLowerCase().endsWith('.docx')) {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    return result.value;
  }
  return await file.text();
}

// ── API Call ──
async function fixSRT(srtEntries, originalText) {
  const apiKeys = localStorage.getItem('srt_fixer_api_keys') || '';
  const model = localStorage.getItem('srt_fixer_model') || '';

  const payload = { srtEntries, originalText };
  if (apiKeys.trim()) payload.apiKeys = apiKeys;
  if (model.trim()) payload.model = model;

  const response = await fetch('/api/fix', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const text = await response.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch {
    throw new Error(`Lỗi server (HTTP ${response.status}). Vui lòng thử lại.`);
  }

  if (!response.ok || !data.success) {
    throw new Error(data.error || `Lỗi API (${response.status})`);
  }

  return data;
}

// ── Processing ──
async function processAll() {
  const completePairs = [];
  for (const [id, p] of pairs) {
    if (p.srtFile && p.originalFile) {
      completePairs.push({ id, ...p });
    }
  }

  if (completePairs.length === 0) {
    showToast('Vui lòng thêm ít nhất một cặp file hoàn chỉnh.');
    return;
  }

  const btn = document.getElementById('btn-process');
  const btnAddPair = document.getElementById('btn-add-pair');
  const progressText = document.getElementById('progress-text');
  const progressBar = document.getElementById('progress-bar');
  const progressHint = document.getElementById('progress-hint');
  const originalHTML = btn.innerHTML;

  btn.disabled = true;
  btnAddPair.disabled = true;
  progressText.style.display = 'block';
  progressBar.classList.add('visible');
  progressHint.textContent = '\u0110ang x\u1eed l\u00fd... Vui l\u00f2ng \u0111\u1ee3i (c\u00f3 th\u1ec3 m\u1ea5t v\u00e0i ph\u00fat)';
  progressHint.classList.add('visible');
  results.length = 0;

  // Elapsed timer
  const startTime = Date.now();
  const timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    const timeStr = mins > 0
      ? `${mins} ph\u00fat ${secs.toString().padStart(2,'0')} gi\u00e2y`
      : `${secs} gi\u00e2y`;
    progressHint.textContent = `\u0110ang x\u1eed l\u00fd... Vui l\u00f2ng \u0111\u1ee3i (${timeStr})`;
  }, 1000);

  // Hide old results & empty state
  const resultsArea = document.getElementById('results-area');
  resultsArea.classList.remove('visible');
  document.getElementById('empty-state').style.display = 'none';

  for (let i = 0; i < completePairs.length; i++) {
    const cp = completePairs[i];
    const label = `\u0110ang x\u1eed l\u00fd ${i + 1}/${completePairs.length}...`;
    btn.innerHTML = `<span class="spinner"></span> ${label}`;
    progressText.textContent = `\u0110ang x\u1eed l\u00fd: ${cp.srtFile.name}`;

    try {
      const srtContent = await cp.srtFile.text();
      const srtEntries = parseSRT(srtContent);

      if (srtEntries.length === 0) {
        showToast(`Không thể đọc file phụ đề ${cp.srtFile.name}`);
        continue;
      }

      const originalText = await extractText(cp.originalFile);

      if (!originalText.trim()) {
        showToast(`File gốc ${cp.originalFile.name} không có nội dung.`);
        continue;
      }

      const apiResult = await fixSRT(srtEntries, originalText);

      if (!apiResult.success) {
        showToast(`${cp.srtFile.name}: ${apiResult.error || 'Lỗi không xác định'}`);
        continue;
      }

      results.push({
        filename: cp.srtFile.name,
        fixed: apiResult.fixed,
        stats: apiResult.stats,
      });
    } catch (err) {
      showToast(`Lỗi xử lý ${cp.srtFile.name}: ${err.message}`);
      console.error(err);
    }
  }

  clearInterval(timerInterval);
  btn.innerHTML = originalHTML;
  btnAddPair.disabled = false;
  progressText.style.display = 'none';
  progressBar.classList.remove('visible');
  progressHint.classList.remove('visible');
  updateProcessButton();

  if (results.length > 0) {
    renderResults();
    showToast(`Đã xử lý thành công ${results.length} file.`, 'success');
  } else {
    document.getElementById('empty-state').style.display = '';
  }
}

// ── Render Results ──
function renderResults() {
  const container = document.getElementById('results-container');
  container.innerHTML = '';
  document.getElementById('empty-state').style.display = 'none';

  results.forEach((res, idx) => {
    const changedEntries = res.fixed.filter(e => e.changed);
    const card = document.createElement('div');
    card.className = 'result-card';

    const errorsLabel = res.stats.errors === 1 ? 'l\u1ed7i' : 'l\u1ed7i';
    const fixedLabel = res.stats.fixed === 1 ? 'v\u1ecb tr\u00ed' : 'v\u1ecb tr\u00ed';

    card.innerHTML = `
      <div class="result-header">
        <span class="result-filename">${escapeHTML(res.filename)}</span>
        <div class="result-stats">
          ${res.stats.errors > 0
            ? `<span class="stat-badge stat-errors">\u26a0 T\u00ecm th\u1ea5y ${res.stats.errors} ${errorsLabel}</span>`
            : `<span class="stat-badge stat-clean">\u2714 Kh\u00f4ng t\u00ecm th\u1ea5y l\u1ed7i</span>`
          }
          ${res.stats.fixed > 0
            ? `<span class="stat-badge stat-fixed">\u2728 \u0110\u00e3 s\u1eeda ${res.stats.fixed} ${fixedLabel}</span>`
            : ''
          }
        </div>
      </div>
      ${changedEntries.length > 0 ? `
        <div style="padding:.5rem 1.25rem">
          <button class="diff-toggle" onclick="toggleDiff(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:3px"><polyline points="6 9 12 15 18 9"/></svg>
            Xem chi ti\u1ebft (${changedEntries.length})
          </button>
        </div>
        <div class="diff-container" id="diff-${idx}">
          <div class="diff-scroll">
            <table class="diff-table">
              <thead>
                <tr>
                  <th style="width:40px">#</th>
                  <th>G\u1ed1c (sai)</th>
                  <th>\u0110\u00e3 s\u1eeda</th>
                </tr>
              </thead>
              <tbody>
                ${changedEntries.map(e => `
                  <tr class="diff-row-changed">
                    <td class="diff-index">${e.index}</td>
                    <td class="diff-original">${escapeHTML(e.original)}</td>
                    <td class="diff-fixed">${escapeHTML(e.text)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      ` : ''}
      <div class="result-actions">
        <button class="btn btn-primary btn-sm" onclick="downloadSingle(${idx})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          T\u1ea3i file \u0111\u00e3 s\u1eeda
        </button>
      </div>
    `;

    container.appendChild(card);
  });

  // Show "Download All" if multiple results
  const dlAllSection = document.getElementById('download-all-section');
  dlAllSection.style.display = results.length > 1 ? '' : 'none';

  const resultsArea = document.getElementById('results-area');
  resultsArea.classList.add('visible');
  resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Diff Toggle ──
function toggleDiff(btn) {
  const container = btn.closest('.result-card').querySelector('.diff-container');
  if (!container) return;
  const isOpen = container.classList.toggle('open');
  const arrow = btn.querySelector('svg');
  if (arrow) arrow.style.transform = isOpen ? 'rotate(180deg)' : '';
  // Update only the text node after the SVG, not the full textContent
  const textNode = Array.from(btn.childNodes).find(n => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
  if (textNode) {
    const count = textNode.textContent.match(/\(\d+\)/)?.[0] || '';
    textNode.textContent = isOpen ? ` \u1ea8n chi ti\u1ebft ${count}` : ` Xem chi ti\u1ebft ${count}`;
  }
}

// ── Download ──
function downloadSRT(entries, filename) {
  const content = '\uFEFF' + buildSRT(entries); // UTF-8 BOM for compatibility
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename.replace(/\.srt$/i, '_fixed.srt');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadSingle(idx) {
  const res = results[idx];
  if (!res) return;
  downloadSRT(res.fixed, res.filename);
}

function downloadAll() {
  results.forEach((res, idx) => {
    setTimeout(() => downloadSRT(res.fixed, res.filename), idx * 200);
  });
}

// ── Utilities ──
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Settings ──
function initSettings() {
  const savedKeys = localStorage.getItem('srt_fixer_api_keys');
  const savedModel = localStorage.getItem('srt_fixer_model');

  const keysEl = document.getElementById('settings-keys');
  const modelEl = document.getElementById('settings-model');

  // Use saved value, or default key
  keysEl.value = savedKeys || 'sk-bee-837f622110f44d64a3ca729a77695314';
  if (savedModel) modelEl.value = savedModel;
}

function toggleSettings() {
  const body = document.getElementById('settings-body');
  const isOpen = body.classList.toggle('open');
  const chevron = document.querySelector('.settings-toggle svg:last-child');
  if (chevron) chevron.style.transform = isOpen ? 'rotate(180deg)' : '';
}

function saveSettings() {
  const keys = document.getElementById('settings-keys').value;
  const model = document.getElementById('settings-model').value;
  localStorage.setItem('srt_fixer_api_keys', keys);
  localStorage.setItem('srt_fixer_model', model);
  showToast('\u0110\u00e3 l\u01b0u c\u00e0i \u0111\u1eb7t!', 'success');
}

// ── Init ──
addPair();
initSettings();
</script>
