name = "srt-fixer"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

routes = [
  { pattern = "srt.checkvarip.pro/*", zone_id = "dde854a37dc261bdadd678dbc91233c2" }
]

[vars]
MODEL = "glm-4.7-flash"

# API_KEYS should be set via `wrangler secret put API_KEYS`
# Format: one key per line
# sk-bee-key1
# sk-bee-key2
# sk-bee-key3

# Import HTML as text module
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false
